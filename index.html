<body>

  <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">

    <!-- SELECTOR DE PANTALLAS -->

      <!-- --- TABLÓN / TIMELINE: agregado debajo del botón --- -->

              <div id="composeActions" style="display:flex; align-items:center; justify-content:space-between;">

                    style="display:none;">Iniciar sesión</button>
                  <button id="btnPost" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored"

              </div>

        <!-- Contenedor de posts -->

          <div style="text-align:center;color:#D98A3D;">Cargando posts...</div>

    <!-- PRODUCTOS -->

    <!-- MAPA -->

  <div id="ticketSelectModal" class="ticket-select-modal">
    <div class="ticket-select-box">

      <div class="ticket-select-header">
        <h3>🎟️ Tus tickets abiertos</h3>

  <!-- Blocking overlay when not logged -->
  <div id="mustLoginOverlay">Por favor, inicia sesión para continuar.</div>

  <!-- SCRIPT PRINCIPAL -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import {
      getFirestore, collection, getDocs, doc, getDoc, setDoc,
      addDoc, serverTimestamp, onSnapshot, query, orderBy, deleteDoc
    } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-storage.js";
    import { where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyALHRvYyTQSTytCPZfbYxd8nmQn0-MGRNg",
      authDomain: "productosceliacos-25779.firebaseapp.com",
      projectId: "productosceliacos-25779",
      storageBucket: "productosceliacos-25779.appspot.com",
      messagingSenderId: "499586918138",
      appId: "1:499586918138:web:ca4aa40434bc3e7c144b43",
      measurementId: "G-6YXHT51EXT"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const CATS = ["Pan", "Snack", "Bebida", "Pasta", "Pizza", "Dulce", "Cereales", "Pastel", "Reposteria", "Congelado", "Helado", "Cerveza", "Batido", "Embutido", "Salsa"];

    const searchBox = document.getElementById("searchBox");
    const catSelect = document.getElementById("catSelect");
    const cardsTarget = document.getElementById("cardsContainer");

    const ticketModal = document.getElementById("ticketModal");
    const ticketFab = document.getElementById("ticketFab");
    const closeTicketModal = document.getElementById("closeTicketModal");
    const ticketType = document.getElementById("ticketType");
    const ticketDynamicFields = document.getElementById("ticketDynamicFields");
    const sendTicketBtn = document.getElementById("sendTicketBtn");
    const ticketMsg = document.getElementById("ticketMsg");

    const storage = getStorage(app);

    let productos = [];
    let isLoading = false;

    const imageCache = {};

    async function getImageURL(path) {
      if (imageCache[path]) return imageCache[path];

      try {
        const url = await getDownloadURL(ref(storage, path));
        imageCache[path] = url;
        return url;
      } catch {
        imageCache[path] = null;
        return null;
      }
    }

    CATS.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      catSelect.appendChild(opt);
    });

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function card(d) {

      // 🔹 NORMALIZAR EMPRESA
      let nombreEmpresa = getEmpresaNombre(d);
      let emp = normalizeEmpresa(nombreEmpresa);

      // 🔹 STORAGE
      let safeId = String(d.id).trim();
      let bigImg = await getImageURL(`producto/${safeId}.png`); // ✅ ID = código barras
      let smallImg = await getImageURL(`empresa/${emp}.png`);

      // 🔹 FALLBACKS
      if (!bigImg) bigImg = "imagenes/defaultProducto.png";
      if (!smallImg) smallImg = "imagenes/defaultEmpresa.png";

      return `
    <div class="demo-card-wide mdl-card mdl-shadow--2dp" style="border-radius:14px;overflow:hidden;background:#499273">

      <div class="mdl-card__title"
        style="height:176px;
        background-image:url('${bigImg}');
        background-size:contain;
        background-position:center;
        background-repeat:no-repeat;">
      </div>

      <div style="display:flex;justify-content:center;margin-top:-30px;">
        <img src="${smallImg}"
          style="width:100px;height:100px;border-radius:50%;border:3px solid white;object-fit:contain;background:#924967;padding:8px;">
      </div>

      <div class="mdl-card__supporting-text" style="text-align:center;background:#AA6C39">
        <strong>${nombreEmpresa}</strong>
        ${d.Nombre ? `<div>${d.Nombre}</div>` : ``}
      </div>

    </div>
  `;
    }

    function normalizeEmpresa(nombre) {
      if (!nombre) return "";

      const original = nombre.toLowerCase().trim();

      // 🔥 EXCEPCIÓN SCHÄR
      if (original.includes("schär") || original.includes("schar")) {
        return "schar";
      }

      return original
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "") // quitar acentos BIEN
        .replace(/\s+/g, "")             // quitar espacios
        .replace(/[^a-z0-9]/g, "");      // limpiar símbolos
    }

    function getEmpresaNombre(d) {
      for (let key in d) {
        if (key.toLowerCase().includes("nombreempresa")) {
          return d[key];
        }
      }
      return "";
    }

    function render() {
      const q = (searchBox.value || '').toLowerCase().trim();
      const cat = (catSelect.value || 'Todas');

      cardsTarget.innerHTML = "";

      if (isLoading) {
        const p = document.createElement('div');
        p.textContent = "Cargando productos...";
        p.style.gridColumn = '1/-1'; p.style.textAlign = 'center'; p.style.color = '#fff';
        cardsTarget.appendChild(p);
        return;
      }

      if (productos.length === 0) {
        const p = document.createElement('div');
        p.textContent = "No hay productos disponibles.";
        p.style.gridColumn = '1/-1'; p.style.textAlign = 'center'; p.style.color = '#fff';
        cardsTarget.appendChild(p);
        return;
      }

      const results = productos
        .filter(d => (!cat || cat === 'Todas') ? true : (d.tipoProducto === cat))
        .filter(d => {
          if (!q) return true;
          const nombreEmpresa = (d.NombreEmpresa || '').toLowerCase();
          const id = (d.id || '').toLowerCase();
          const tipo = (d.tipoProducto || '').toLowerCase();
          const nombre = (d.Nombre || '').toLowerCase();
          return nombreEmpresa.includes(q) || id.includes(q) || tipo.includes(q) || nombre.includes(q);
        });

      if (results.length === 0) {
        const p = document.createElement('div');
        p.textContent = "No se han encontrado productos para esa búsqueda.";
        p.style.gridColumn = '1/-1'; p.style.textAlign = 'center'; p.style.color = '#fff';
        cardsTarget.appendChild(p);
        return;
      }

      (async () => {
        for (const d of results) {
          cardsTarget.insertAdjacentHTML("beforeend", await card(d));
        }
      })();
    }

    async function load() {
      isLoading = true;
      render();
      try {
        const snap = await getDocs(collection(db, "Productos"));
        productos = [];
        snap.forEach(doc => productos.push({ id: doc.id, ...doc.data() }));
      } catch (e) {
        console.error("Error cargando productos:", e);
        productos = [];
      } finally {
        isLoading = false;
        render();
      }
    }

    searchBox.addEventListener("input", render);
    catSelect.addEventListener("change", render);
    load();

    // --- VISTAS ---
    function mostrarProductos() {
      document.getElementById("homeView").style.display = "none";
      document.getElementById("vistaProductos").style.display = "block";
      window.scrollTo(0, 0);
    }

    function mostrarHome() {
      document.getElementById("vistaProductos").style.display = "none";
      document.getElementById("homeView").style.display = "flex";
      window.scrollTo(0, 0);
    }

    document.getElementById("btnHomeHeader").addEventListener("click", e => {
      e.preventDefault();
      vistaActual = "principal";
      selectorLabel.textContent = "Principal";
      mostrarHome();
    });

    const selectorLabel = document.getElementById("selectorLabel");
    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");
    let vistaActual = 0;
    const vistas = ["principal", "productos", "mapa"];

    function cambiarVista(direccion) {
      if (direccion === "right") vistaActual++;
      else vistaActual--;

      if (vistaActual < 0) vistaActual = vistas.length - 1;
      if (vistaActual >= vistas.length) vistaActual = 0;

      const vista = vistas[vistaActual];

      document.getElementById("homeView").style.display = "none";
      document.getElementById("vistaProductos").style.display = "none";
      document.getElementById("vistaMapa").style.display = "none";

      if (vista === "principal") {
        document.getElementById("homeView").style.display = "flex";
        selectorLabel.textContent = "Principal";
      }

      if (vista === "productos") {
        document.getElementById("vistaProductos").style.display = "block";
        selectorLabel.textContent = "Productos";
      }

      if (vista === "mapa") {
        document.getElementById("vistaMapa").style.display = "block";
        selectorLabel.textContent = "Mapa";
        setTimeout(initMapa, 100); // importante para render
      }
    }

    btnLeft.addEventListener("click", () => cambiarVista("left"));
    btnRight.addEventListener("click", () => cambiarVista("right"));

    // --- ESCÁNER COMPATIBLE ANDROID + iOS ---

    let scanning = false;
    let stream = null;
    const scannerModal = document.getElementById("scannerModal");
    const btnOpenScanner = document.getElementById("btnOpenScanner");
    const btnCloseScanner = document.getElementById("btnCloseScanner");
    const videoScanner = document.getElementById("videoScanner");

    // ZXing fallback (para iOS viejos)
    let codeReader = null;

    btnOpenScanner.addEventListener("click", async () => {
      scannerModal.style.display = "flex";
      await new Promise(r => setTimeout(r, 300));
      startScanner();
    });

    btnCloseScanner.addEventListener("click", () => stopScanner());

    async function startScanner() {
      scanning = true;

      // --- INTENTAR BarcodeDetector NATIVO ---
      const barcodeSupported = "BarcodeDetector" in window;
      let detector = null;

      if (barcodeSupported) {
        try {
          detector = new BarcodeDetector({
            formats: ["ean_13", "ean_8", "code_128"]
          });
        } catch (e) {
          detector = new BarcodeDetector();
        }
      }

      // --- SOLICITAR CÁMARA COMPATIBLE CON iOS ---
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" }
          },
          audio: false
        });
      } catch (e) {
        // fallback iOS si falla facingMode
        stream = await navigator.mediaDevices.getUserMedia({
          video: true
        });
      }

      videoScanner.srcObject = stream;

      try {
        await videoScanner.play();
      } catch (e) {
        alert("No se pudo reproducir la cámara.");
        stopScanner();
        return;
      }

      // --- SI BarcodeDetector EXISTE → USARLO ---
      if (barcodeSupported) {
        const loop = async () => {
          if (!scanning) return;

          try {
            const codes = await detector.detect(videoScanner);
            if (codes.length > 0) {
              const code = codes[0].rawValue;
              scanning = false;
              stopScanner();
              buscarProducto(code);
              return;
            }
          } catch { }

          requestAnimationFrame(loop);
        };

        loop();
        return;
      }

      // --- SI NO hay BarcodeDetector → fallback ZXing ---
      await startZXingFallback();
    }

    // Cierra cámara completamente
    function stopScanner() {
      scanning = false;
      scannerModal.style.display = "none";

      if (codeReader) {
        try { codeReader.reset(); } catch { }
      }

      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }

      videoScanner.srcObject = null;
    }


    // --- ZXing fallback para iOS antiguos ---
    async function startZXingFallback() {
      // Cargar ZXing si no existe
      if (!codeReader) {
        codeReader = new ZXing.BrowserMultiFormatReader();
      }

      try {
        const videoInputDevices = await codeReader.listVideoInputDevices();
        const backCamera = videoInputDevices.find(d =>
          d.label.toLowerCase().includes("back")
        ) || videoInputDevices[0];

        await codeReader.decodeFromVideoDevice(
          backCamera.deviceId,
          videoScanner,
          (result, err) => {
            if (!scanning) return;

            if (result) {
              scanning = false;
              stopScanner();
              buscarProducto(result.text);
            }
          }
        );
      } catch (e) {
        console.error("ZXing fallback error:", e);
        alert("No se pudo iniciar el lector en este dispositivo.");
        stopScanner();
      }
    }

    // --- MOSTRAR PRODUCTO ---
    const productoModal = document.getElementById("productoModal");
    const productoContent = document.getElementById("productoContent");

    document.getElementById("closeProducto").addEventListener("click", () => {
      productoModal.style.display = "none";
    });

    async function buscarProducto(id) {
      try {
        const ref = doc(db, "Productos", id);
        const found = await getDoc(ref);

        if (!found.exists()) {
          productoContent.innerHTML = `<h3>No encontrado</h3><p>El código ${id} no está registrado.</p>`;
          productoModal.style.display = "flex";
          return;
        }

        const d = found.data();
        d.id = id;

        const html = await card(d);
        productoContent.innerHTML = html;
        productoModal.style.display = "flex";

      } catch (e) {
        productoContent.innerHTML = `<h3>Error</h3><p>No se pudo buscar el producto.</p>`;
        productoModal.style.display = "flex";
      }
    }

    // --- AUTH & PROFILE ---
    const authModal = document.getElementById('authModal');
    const closeAuth = document.getElementById('closeAuth');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const authTitle = document.getElementById('authTitle');
    const authMsg = document.getElementById('authMsg');
    const profileCircle = document.getElementById('profileCircle');
    const profileInitials = document.getElementById('profileInitials');
    const mustLoginOverlay = document.getElementById('mustLoginOverlay');

    function openAuth(defaultTab = 'login') {
      authMsg.textContent = '';
      authModal.style.display = 'flex';
      if (defaultTab === 'login') showLogin(); else showRegister();
    }
    function closeAuthModal() { authModal.style.display = 'none'; }

    closeAuth.addEventListener('click', closeAuthModal);
    tabLogin.addEventListener('click', showLogin);
    tabRegister.addEventListener('click', showRegister);

    // --- LOGIN ---
    async function loginUser() {
      const idOrEmail = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (!idOrEmail || !pass) { authMsg.textContent = 'Rellena todos los campos.'; return; }

      try {
        let email = idOrEmail;

        try {
          // intentamos login por email
          await signInWithEmailAndPassword(auth, email, pass);
        } catch (err) {
          // si falla, buscamos por nombreUsuario en Firestore
          const usersSnap = await getDocs(collection(db, 'Usuarios'));
          let found = null;
          usersSnap.forEach(d => { if (d.data().nombreUsuario === idOrEmail) found = { id: d.id, ...d.data() }; });
          if (!found) { authMsg.textContent = 'Usuario no encontrado.'; return; }
          email = found.id;
          await signInWithEmailAndPassword(auth, email, pass);
        }

        localStorage.setItem('gluco_currentUser', email);
        closeAuthModal();
        updateUIForUser(email, idOrEmail);
      } catch (e) { console.error(e); authMsg.textContent = 'Error al iniciar sesión. ' + (e.message || ''); }

    function listenTickets() {
      const container = document.getElementById("ticketsContainer");
      const user = localStorage.getItem('gluco_currentUser');

      container.innerHTML = "";

      // 🔵 1. Tickets SIN asignar
      const q1 = query(

        where("staffAsignado", "==", user),

      );

      function render(docu) {
        const t = docu.data();

        if (t.estado === "cerrado") return;
        if (!t.fecha || !t.fecha.toDate) return;

        const div = document.createElement("div");
        div.className = "ticket-card";

        div.innerHTML = `

      ${t.mensaje || ""}<br>
      Estado: ${t.estado}<br>
      Staff: ${t.staffAsignado || "Nadie"}

        if (!t.staffAsignado) {
          const btn = document.createElement("button");
          btn.textContent = "Aceptar";
          btn.onclick = () => aceptarTicket(docu.id);
          div.appendChild(btn);
        }

        if (t.staffAsignado === user) {
          const btn = document.createElement("button");
          btn.textContent = "Abrir chat";
          btn.onclick = () => abrirChat(docu.id);
          div.appendChild(btn);
        }

        container.appendChild(div);
      }

      // 👂 escuchar sin asignar
      onSnapshot(q1, snap => {
        snap.forEach(render);
      });

      // 👂 escuchar asignados
      onSnapshot(q2, snap => {
        snap.forEach(render);
      });
    }

      const list = document.getElementById("ticketSelectList");
      list.innerHTML = "";

      tickets.forEach(t => {

        // 🔒 seguridad extra
        if (t.estado === "cerrado") return;

        const card = document.createElement("div");
        card.className = "ticket-card-user";

        card.innerHTML = `
      <div class="ticket-card-title">${t.tipo}</div>

      <div class="ticket-card-text">
        ${t.mensaje || t.nombreProducto || "Sin descripción"}
      </div>

      <div class="ticket-card-status">
        Estado: ${t.estado}
      </div>
    `;

        card.onclick = () => {
          document.getElementById("ticketSelectModal").style.display = "none";
          abrirChat(t.id);
        };

        list.appendChild(card);
      });

      document.getElementById("ticketSelectModal").style.display = "flex";
    });

    document.getElementById("closeTicketSelect").addEventListener("click", () => {
      document.getElementById("ticketSelectModal").style.display = "none";
    });

    document.getElementById("closeChat").addEventListener("click", () => {
      document.getElementById("chatModal").style.display = "none";
    });

    document.getElementById("chatModal").addEventListener("click", (e) => {
      if (e.target.id === "chatModal") {
        e.currentTarget.style.display = "none";
      }
    });

    document.getElementById("closeTicketBtn").addEventListener("click", async () => {
      if (!currentTicket) return;

      if (!confirm("¿Seguro que quieres cerrar este ticket?")) return;

      try {
        await updateDoc(doc(db, "Tickets", currentTicket), {
          estado: "cerrado"
        });

        alert("Ticket cerrado ✅");

        // cerrar chat
        document.getElementById("chatModal").style.display = "none";

      } catch (e) {
        console.error(e);
        alert("Error al cerrar el ticket");
      }
    });

    async function obtenerTicketsAbiertosUsuario() {
      const cur = localStorage.getItem('gluco_currentUser');
      if (!cur) return [];

      const q = query(
        collection(db, "Tickets"),
        where("autorEmail", "==", cur),
        where("estado", "in", ["abierto", "en_proceso"])
      );

      const snap = await getDocs(q);

      const tickets = [];
      snap.forEach(doc => {
        tickets.push({ id: doc.id, ...doc.data() });
      });

      return tickets;
    }

    // SCRIPT MAPA

    let map = null;
    let markers = [];
    let timeoutMapa = null;
    let cacheZonas = new Set();
    let cargando = false;
    let userLocation = null;
    let reintentos = {};


    async function getUserLocation() {

      if (userLocation) return userLocation;

      const saved = localStorage.getItem("gluco_user_location");
      if (saved) {
        userLocation = JSON.parse(saved);
        return userLocation;
      }

      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(pos => {

          userLocation = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          };

          localStorage.setItem("gluco_user_location", JSON.stringify(userLocation));

          resolve(userLocation);

        }, () => {
          console.warn("Usando ubicación fallback");

          userLocation = { lat: 40.4168, lng: -3.7038 }; // Madrid

          resolve(userLocation);
        });
      });
    }

    async function initMapa() {
      if (map) return;

      const loc = await getUserLocation();

      map = L.map('map').setView([loc.lat, loc.lng], 14);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap & CARTO'
      }).addTo(map);

      cargarSitiosSinGluten();

      map.on('moveend', () => {
        clearTimeout(timeoutMapa);
        timeoutMapa = setTimeout(() => {
          cargarSitiosSinGluten();
        }, 1000);
      });
    }


    function getZonaKey(bounds) {
      return [
        bounds.getSouth().toFixed(2),
        bounds.getWest().toFixed(2),
        bounds.getNorth().toFixed(2),
        bounds.getEast().toFixed(2)
      ].join(",");
    }

    const mapLoading = document.getElementById("mapLoading");

    function showMapLoading() {
      if (mapLoading) mapLoading.style.display = "block";
    }

    function hideMapLoading() {
      if (mapLoading) mapLoading.style.display = "none";
    }

    async function cargarSitiosSinGluten() {

      if (!map) return;
      if (map.getZoom() < 13) return;
      if (cargando) return;

      const bounds = map.getBounds();
      const zonaKey = getZonaKey(bounds);

      if (cacheZonas.has(zonaKey)) return;

      cargando = true;
      showMapLoading();

      const south = bounds.getSouth();
      const west = bounds.getWest();
      const north = bounds.getNorth();
      const east = bounds.getEast();

      const query = `
[out:json][timeout:15];
(
  node["amenity"="restaurant"]["diet:gluten_free"~"yes|only"](${south},${west},${north},${east});
  node["amenity"="cafe"]["diet:gluten_free"~"yes|only"](${south},${west},${north},${east});
  node["tourism"="hotel"]["diet:gluten_free"~"yes|only"](${south},${west},${north},${east});
);
out body;
`;

      const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

      try {


        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);

        const res = await fetch("https://overpass-api.de/api/interpreter", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "Accept": "application/json"
          },
          body: "data=" + encodeURIComponent(query)
        });
        clearTimeout(timeout);

        const text = await res.text();

        if (text.startsWith("<")) {
          console.warn("Overpass devolvió HTML");
          return; // ⚠️ no cachear
        }

        const data = JSON.parse(text);

        // ✅ SOLO aquí cacheamos
        cacheZonas.add(zonaKey);

        data.elements.forEach(el => {
          if (!el.lat || !el.lon) return;

          const nombre = el.tags?.name || "Sin nombre";

          const marker = L.marker([el.lat, el.lon]).addTo(map);
          marker.bindPopup(`<strong>${nombre}</strong>`);

          markers.push(marker);
        });

      } catch (e) {

        if (e.name === "AbortError") {
          console.warn("⏱️ Timeout");

          // 🔥 contar reintentos por zona
          reintentos[zonaKey] = (reintentos[zonaKey] || 0) + 1;

          if (reintentos[zonaKey] <= 2) {
            console.log("🔁 Reintentando...", reintentos[zonaKey]);

            setTimeout(() => {
              cargando = false;
              cargarSitiosSinGluten();
            }, 2000);

            return;
          }

        } else {
          console.error("❌ Error real:", e);
        }

      }

      hideMapLoading();
      cargando = false;
    }


    function limpiarMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

  </script>

  <button id="ticketFab" class="ticket-fab">
    <span class="ticket-icon">🎟️</span>
  </button>

</body>

</html>
